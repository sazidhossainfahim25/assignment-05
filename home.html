<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>
  <link rel="shortcut icon" href="./assets/fev.webp" type="image/x-icon">
  <!-- tailwind css -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- font Geist -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap"   rel="stylesheet">
  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC]">
  <!-- ==================== header start ======================== -->
    <header class="bg-[#FFF] border-b border-[#E9E9E9] max-w-full lg:px-[80px] px-[20px] shadow-sm">
    <nav class=" lg:flex justify-between items-center py-[17px] ">
      <!-- logo -->
      <div class="logo lg:flex items-center text-center gap-2">
        <img src="assets/github-logo.png" class="lg:w-[36px] lg:h-[37px]  lg:aspect-[36/37] mx-auto" alt="">
        <h2 class="text-[#1F2937] lg:text-[24px] text-3xl lg:font-semibold font-bold  lg:ml-1">GitHub Issues Tracker</h2>
      </div>
      <!-- Search -->
       <div class=" flex items-center gap-1 justify-center pt-4">
          <label class="input">
          <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
        <input type="search"  id="searchInput" required placeholder="Search issuesh" />
      </label>
    <!-- button -->
      <button id="searchButton" class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
       </div>
    </nav>
  </header>
  <!--============================ header end=================== -->
  <main class="lg:max-w-[1062px] max-w-[90%] mx-auto min-h-screen w-full py-[60px] space-y-3">
    <!-- IssuesBtn start -->
    <section class="IssuesBtn boxmodel ">
      <div class="btn-tabs p-6 flex items-center justify-start gap-1">
        <button onclick="setActiveTab('allTab')" id="allTab" class="btntab text-[#64748B]   hover:bg-blue-700 hover:text-white transition">all</button>
        <button onclick="setActiveTab('openTab')" id="openTab" class="btntab text-[#64748B] hover:bg-blue-700 hover:text-white transition">open</button>
        <button onclick="setActiveTab('closeTab')" id="closeTab" class="btntab text-[#64748B] hover:bg-blue-700 hover:text-white transition">close</button>
      </div>
    </section>
    <!-- IssuesBtn end -->
     <!-- IssuesStatus start -->
    <section id="IssuesStatus" class=" boxmodel ">
        <div class="flex justify-between items-center p-6">
          <div class="left-side">
            <div class=" flex  items-center gap-3">
              <img src="assets/Aperture.png" alt="">
              <div class="titel">
                <h2 class="titel-text"><span id="issueLength">0</span> Issues</h2>
                <p class="pere-text text-[16px]">Track and manage your project issues</p>
                
              </div>
            </div>
          </div>
          <div class="right-site">
            <div class="flex items-center gap-3">
                <div>
              <div class="flex  items-center gap-1 justify-center">
                <img src="assets/Open-Status.png " class="w-4 h-4" alt="">
                <h2 class="titel-text">open</h2>
              </div>
            </div>
            <div>
            </div>
              <div class="flex  items-center gap-1 justify-center">
                <img src="assets/Closed .png" class="w-4 h-4" alt="">
                <h2 class="titel-text">close</h2>
              </div>
            </div>
          </div>
        </div>
    </section>
    <!-- IssuesStatus end -->
    <!--issuesContainer start  -->
    <div id="issuesContainer" class=" grid lg:grid-cols-4 md:grid-cols-2 grid-cols-1 gap-4">

    </div>
    <!-- issuesContainer end -->

      <!-- Modal Background -->
<div id="modal" class="hidden fixed inset-0 items-center justify-center bg-black/40">
  <div class="bg-white w-[500px] rounded-lg shadow-lg p-6">
    <h2 class="text-2xl font-bold mb-2"></h2>
    <div class="flex items-center gap-2 mb-3">
      <span class="status-span text-xs px-2 py-1 rounded-full"></span>
      <p class="text-sm text-gray-500 createdAt"></p>
    </div>
    <div class="flex gap-2 mb-4 tags-container"></div>
    <p class="text-gray-600 text-sm mb-6 modal-desc"></p>
    <div class="bg-gray-100 rounded-lg p-4 flex justify-between items-center mb-6">
      <div>
        <p class="text-sm text-gray-500">Assignee:</p>
        <p class="font-semibold assignee"></p>
      </div>
      <div class="text-center">
        <p class="text-sm text-gray-500 mb-1">Priority:</p>
        <span class="bg-red-500 text-white text-xs px-3 py-1 rounded-full modal-priority"></span>
      </div>
    </div>
    <div class="flex justify-end">
      <button class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700 close-btn">Close</button>
    </div>
  </div>
</div>
  </main>
   <script src="home.js"></script>
</body>
</html>
