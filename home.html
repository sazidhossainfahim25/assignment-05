<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>
  <link rel="shortcut icon" href="./assets/fev.webp" type="image/x-icon">
  <!-- tailwind css -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- font Geist -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap"   rel="stylesheet">
  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC]">
  <!-- ==================== header start ======================== -->
    <header class="bg-[#FFF] border-b border-[#E9E9E9] max-w-full lg:px-[80px] px-[20px] shadow-sm">
    <nav class=" flex justify-between items-center py-[17px] ">
      <!-- logo -->
      <div class="logo flex items-center">
        <img src="assets/github-logo.png" class="lg:w-[36px] lg:h-[37px] w-[26px] h-[27px]  aspect-[26/27]" alt="">
        <h2 class="text-[#1F2937] lg:text-[24px] text-[10px] font-semibold ml-1">GitHub Issues Tracker</h2>
      </div>
      <!-- Search -->
       <div class=" flex items-center gap-1 justify-center">
        <!-- Search issues... -->
    <label class="input">
      <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <g
          stroke-linejoin="round"
          stroke-linecap="round"
          stroke-width="2.5"
          fill="none"
          stroke="currentColor"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </g>
      </svg>
      <input type="search" required placeholder="Search issues..." />
    </label>
    <!-- button -->
      <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
       </div>
    </nav>
  </header>
  <!--============================ header end=================== -->
  <main class="lg:max-w-[1062px] max-w-[90%] mx-auto min-h-screen w-full py-[60px] space-y-3">
    <!-- IssuesBtn start -->
    <section class="IssuesBtn boxmodel ">
      <div class="btn-tabs p-6 flex items-center justify-start gap-1">
        <button class="btntab bg-[#4A00FF] text-white">all</button>
        <button class="btntab text-[#64748B]">open</button>
        <button class="btntab text-[#64748B]">close</button>
      </div>
    </section>
    <!-- IssuesBtn end -->
     <!-- IssuesStatus start -->
    <section class="IssuesStatus boxmodel ">
        <div class="flex justify-between items-center p-6">
          <div class="left-side">
            <div class=" flex  items-center gap-3">
              <img src="assets/Aperture.png" alt="">
              <div class="titel">
                <h2 class="titel-text">50 Issues</h2>
                <p class="pere-text">Track and manage your project issues</p>
              </div>
            </div>
          </div>
          <div class="right-site">
            <div class="flex items-center gap-3">
                <div>
              <div class="flex  items-center gap-1 justify-center">
                <img src="assets/Open-Status.png " class="w-4 h-4" alt="">
                <h2 class="titel-text">open</h2>
              </div>
            </div>
            <div>
            </div>
              <div class="flex  items-center gap-1 justify-center">
                <img src="assets/Closed- Status .png " class="w-4 h-4" alt="">
                <h2 class="titel-text">close</h2>
              </div>
            </div>
          </div>
        </div>
    </section>
    <!-- IssuesStatus end -->
    <!--allissuesCard start  -->
    <div class="allissuesCard"></div>
    <!-- allissuesCard end -->
  </main>
   <script src="script.js"></script>
</body>
</html>
